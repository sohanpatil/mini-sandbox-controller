# This rule is not used by the project mini-sandbox-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the demo.example.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mini-sandbox-controller
    app.kubernetes.io/managed-by: kustomize
  name: sandboxtemplate-editor-role
rules:
- apiGroups:
  - demo.example.com
  resources:
  - sandboxtemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - demo.example.com
  resources:
  - sandboxtemplates/status
  verbs:
  - get
